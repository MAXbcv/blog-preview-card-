<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <main aria-label="Blog preview">
    <article class="all" class="card" role="article">
      <figure>
        <img src="./assets/images/illustration-article.svg" alt="Article illustration" class="image" loading="lazy">
      </figure>

      <header>
        <button class="learing">Learning</button>
        <p >Published 21 Dec 2023</p>
      </header>

      <section >
        <h1>HTML & CSS foundations</h1>
        <p class="titre_p">These languages are the backbone of every website, defining
          structure, content, and presentation.</p>
      </section>

      <footer >
        <img src="./assets/images/image-avatar.webp" alt="Greg Hooper" class="avtar"  width="40"
          height="40">
        <h3>Greg Hooper</h3>
      </footer>
    </article>

    <div class="attribution">
      Challenge by <a rel="noopener noreferrer" href="https://www.frontendmentor.io?ref=challenge"
        target="_blank">Frontend Mentor</a>.
      Coded by <a href="https://github.com/MAXbcv/blog-preview-card-">MAXbcv</a>.
    </div>
  </main>
</body>

</html>
